{% if game.status.value == 'in_progress' %}
<script>
    if ("{{ game.status.name }}" === "IN_PROGRESS" || "{{ game.status }}" === "IN_PROGRESS") {
        // Добавляем айдишник, чтобы игрок не превратился в Черрешню!
        window.location.href = "/game/{{ game.id }}/play?tg_id={{ current_tg_id }}";
    }
</script>
{% endif %}

<ul style="list-style: none; padding: 0;">
    {% for player in players %}
        <li style="padding: 10px; background: #222; margin-bottom: 5px; border-radius: 4px;">
            👤 {{ player.name }} 
            {% if player.tg_user_id == 123 %} <span style="color: #ff4757; font-size: 0.8em;">[ВЕДУЩИЙ]</span> {% endif %}
        </li>
    {% else %}
        <li>Никого нет...</li>
    {% endfor %}
</ul>
<p>Всего: {{ players|length }} / {{ game.bunker_capacity }}</p>
