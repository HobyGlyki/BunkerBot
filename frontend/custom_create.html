{% extends "base.html" %}

{% block content %}
<div class="admin-container" style="max-width: 800px; margin: 0 auto;">
    <h1 style="color: #ffa502;">🛠️ Конструктор Сценария</h1>
    <p style="color: #888;">Здесь вы можете создать уникальный мир. Технические параметры (еда, инвентарь) будут добавлены случайно.</p>

    <form action="/create_custom_game" method="post" style="background: #1a1a1a; padding: 30px; border-radius: 10px; border: 1px solid #333;">
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 10px; color: #ff4757;"><b>Описание катастрофы:</b></label>
            <textarea name="disaster" rows="5" style="width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 10px;" placeholder="Например: В 2029 году небо стало фиолетовым, а трава начала есть людей..." required></textarea>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 10px; color: #ff4757;"><b>Описание самого бункера:</b></label>
            <textarea name="bunker_desc" rows="4" style="width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 10px;" placeholder="Например: Старый советский погреб, переделанный под элитное жилье с запахом нафталина..." required></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
            <div>
                <label style="display: block; margin-bottom: 10px;">Вместимость (чел):</label>
                <input type="number" name="capacity" value="4" style="width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 10px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 10px;">Площадь (м²):</label>
                <input type="number" name="area" value="150" style="width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 10px;">
            </div>
        </div>

        <button type="submit" class="btn primary" style="width: 100%; font-size: 1.2em;">🚀 СОЗДАТЬ И ЗАЙТИ В ЛОББИ</button>
    </form>
</div>
{% endblock %}
